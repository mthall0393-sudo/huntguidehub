<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HuntGuideHub - Outfitters for Species | HuntGuideHub</title>
    <meta name="description" content="Find licensed hunting outfitters specializing in various species across the United States." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <script src="outfitters.js"></script>
</head>
<body>
    <header class="site-header">
        <h1>Outfitters for <span id="speciesName">All Species</span></h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="states.html">States</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <!-- Filter Section -->
        <section class="filters" style="padding:1.5rem; background:#f5f5f5; border-bottom:1px solid #ddd;">
            <div style="max-width:1200px; margin:0 auto; display:flex; flex-wrap:wrap; gap:1rem; align-items:center;">
                <div style="flex:1; min-width:200px;">
                    <label style="font-weight:bold; display:block; margin-bottom:0.5rem;">Filter by State</label>
                    <select id="stateFilter" style="padding:0.5rem; width:100%; border-radius:4px; border:1px solid #ddd;">
                        <option value="">All States</option>
                        <option value="CO">Colorado</option>
                        <option value="TX">Texas</option>
                        <option value="WY">Wyoming</option>
                        <option value="MT">Montana</option>
                        <option value="KS">Kansas</option>
                        <option value="OH">Ohio</option>
                        <option value="IA">Iowa</option>
                        <option value="SD">South Dakota</option>
                        <option value="AZ">Arizona</option>
                        <option value="MI">Michigan</option>
                        <option value="AK">Alaska</option>
                        <option value="OK">Oklahoma</option>
                        <option value="LA">Louisiana</option>
                        <option value="MO">Missouri</option>
                        <option value="NE">Nebraska</option>
                        <option value="MN">Minnesota</option>
                        <option value="KY">Kentucky</option>
                        <option value="NM">New Mexico</option>
                        <option value="AR">Arkansas</option>
                        <option value="GA">Georgia</option>
                        <option value="FL">Florida</option>
                        <option value="MS">Mississippi</option>
                    </select>
                </div>
                <div style="flex:1; min-width:200px;">
                    <label style="font-weight:bold; display:block; margin-bottom:0.5rem;">Filter by Price</label>
                    <select id="priceFilter" style="padding:0.5rem; width:100%; border-radius:4px; border:1px solid #ddd;">
                        <option value="">Any Price</option>
                        <option value="low">Under $1,500</option>
                        <option value="mid">$1,500 - $3,000</option>
                        <option value="high">Over $3,000</option>
                    </select>
                </div>
                <div style="flex:1; min-width:200px;">
                    <label style="font-weight:bold; display:block; margin-bottom:0.5rem;">Filter by Species</label>
                    <select id="speciesFilter" style="padding:0.5rem; width:100%; border-radius:4px; border:1px solid #ddd;">
                        <option value="">All Species</option>
                        <option value="Elk">Elk</option>
                        <option value="Deer">Deer</option>
                        <option value="Waterfowl">Waterfowl</option>
                        <option value="Pheasant">Pheasant</option>
                        <option value="Bear">Bear</option>
                        <option value="Hog">Hog</option>
                        <option value="Turkey">Turkey</option>
                        <option value="Antelope">Antelope</option>
                    </select>
                </div>
                <div style="flex:1; min-width:200px;">
                    <label style="font-weight:bold; display:block; margin-bottom:0.5rem;">Sort By</label>
                    <select id="sortFilter" style="padding:0.5rem; width:100%; border-radius:4px; border:1px solid #ddd;">
                        <option value="name">Name A-Z</option>
                        <option value="rating">Highest Rated</option>
                        <option value="price">Price: Low to High</option>
                    </select>
                </div>
                <div style="flex:1; min-width:200px;">
                    <label style="font-weight:bold; display:block; margin-bottom:0.5rem;">&nbsp;</label>
                    <button id="applyFilters" style="padding:0.5rem 1rem; background:#2c5f2d; color:#fff; border:none; border-radius:4px; cursor:pointer;">Apply Filters</button>
                </div>
            </div>
        </section>

        <!-- Results count -->
        <p id="resultsCount" style="padding:1rem 2rem; color:#666;">Showing all outfitters</p>

        <!-- Outfitters Grid -->
        <section id="outfitters" class="outfitter-grid" style="padding:2rem;">
        </section>
    </main>
    <footer class="site-footer">
        <p>&copy; 2026 HuntGuideHub. All rights reserved.</p>
    </footer>
    <script>
        // Load outfitters from outfitters.js
        const allOutfitters = typeof OUTFITTERS !== 'undefined' ? OUTFITTERS.map(o => ({
            name: o.name,
            city: o.city,
            state: o.state,
            species: o.species ? o.species.join(', ') : '',
            price: o.priceStarting || 0,
            rating: o.rating || 0,
            email: o.email || '',
            id: o.id
        })) : [];
        
        // Get species from URL
        const params = new URLSearchParams(window.location.search);
        let speciesFilter = params.get('species') || '';
        
        // Update page title
        if (speciesFilter) {
            document.getElementById('speciesName').textContent = speciesFilter.charAt(0).toUpperCase() + speciesFilter.slice(1);
            document.title = `HuntGuideHub - ${speciesFilter.charAt(0).toUpperCase() + speciesFilter.slice(1)} Outfitters`;
        }

        // Render outfitters
        function renderOutfitters(outfitters) {
            const grid = document.getElementById('outfitters');
            document.getElementById('resultsCount').textContent = `Showing ${outfitters.length} outfitters`;
            
            if (outfitters.length === 0) {
                grid.innerHTML = '<p style="padding:2rem; text-align:center; color:#666;">No outfitters found matching your criteria.</p>';
                return;
            }
            
            grid.innerHTML = outfitters.map(o => `
                <div class="outfitter-card">
                    <h3>${o.name}</h3>
                    <p>📍 ${o.city}, ${o.state}</p>
                    <p>🎯 ${o.species}</p>
                    <p>Starting price: $${o.price.toLocaleString()}</p>
                    <p>Rating: ${o.rating} ★</p>
                    <a href="outfitter.html?id=${o.id}" class="contact-btn">View Profile</a>
                </div>
            `).join('');
        }

        // Filter function
        function filterOutfitters() {
            let filtered = [...allOutfitters];
            
            // Filter by species (from URL or dropdown) - case insensitive
            const speciesDropdown = document.getElementById('speciesFilter')?.value || '';
            const speciesToFilter = speciesFilter || speciesDropdown;
            if (speciesToFilter) {
                filtered = filtered.filter(o => o.species.toLowerCase().includes(speciesToFilter.toLowerCase()));
            }
            
            // Filter by state
            const stateFilter = document.getElementById('stateFilter').value;
            if (stateFilter) {
                filtered = filtered.filter(o => o.state === stateFilter);
            }
            
            // Filter by price
            const priceFilter = document.getElementById('priceFilter').value;
            if (priceFilter === 'low') {
                filtered = filtered.filter(o => o.price < 1500);
            } else if (priceFilter === 'mid') {
                filtered = filtered.filter(o => o.price >= 1500 && o.price <= 3000);
            } else if (priceFilter === 'high') {
                filtered = filtered.filter(o => o.price > 3000);
            }
            
            // Sort
            const sortFilter = document.getElementById('sortFilter').value;
            if (sortFilter === 'name') {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortFilter === 'rating') {
                filtered.sort((a, b) => b.rating - a.rating);
            } else if (sortFilter === 'price') {
                filtered.sort((a, b) => a.price - b.price);
            }
            
            renderOutfitters(filtered);
        }

        // Event listeners
        document.getElementById('applyFilters').addEventListener('click', filterOutfitters);
        
        // Initial render - case insensitive
        renderOutfitters(allOutfitters.filter(o => !speciesFilter || o.species.toLowerCase().includes(speciesFilter.toLowerCase())));
    </script>
</body>
</html>
