<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact HuntGuideHub | HuntGuideHub</title>
    <meta name="description" content="Get in touch with HuntGuideHub. Send us your questions, partnership inquiries, or feedback about our hunting outfitter directory." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ContactPage",
      "url": "https://huntguidehub.com/contact.html",
      "description": "Contact form for HuntGuideHub visitors."
    }
    </script>
</head>
<body>
    <header class="site-header">
        <h1>Contact HuntGuideHub</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="blog.html">Blog</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>We'd love to hear from you</h2>
            <form action="#" method="POST" id="contactForm">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required />
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required />
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>
    <footer class="site-footer">
        <div>
            <a href="index.html" class="footer-logo">HuntGuideHub</a>
            <p class="footer-copy">&copy; 2026 HuntGuideHub. All rights reserved.</p>
        </div>
        <div class="footer-links">
        <p>&copy; 2026 HuntGuideHub. All rights reserved.</p>
        <nav>
            <a href="privacy.html">Privacy Policy</a> |
            <a href="terms.html">Terms of Service</a>
        </nav>
    </footer>
    <script>
        // Simple form handler placeholder – prevent actual submission
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Thank you! Your message has been received.');
            this.reset();
        });
    </script>
</body>
</html>
